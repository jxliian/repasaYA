<html lang="es">
<head>

  <title>Organización de Empresas · Tipo Test — repasaYA</title>
  <link rel="icon" type="image/png" href="../../logo.png" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Organización de Empresas · Tipo Test — repasaYA" />
  <meta property="og:description" content="83 preguntas tipo test de Organización de Empresas (Mintzberg). Gratis, sin registro." />
  <meta property="og:image" content="https://jxliian.github.io/repasaYA/logo.png" />
  <style>
    :root {
      --bg: #0f1117; --surface: #1a1d27; --surface2: #252836; --border: #2e3347;
      --accent: #6c63ff; --accent2: #a78bfa; --accent-hover: #574fd6;
      --correct: #22c55e; --wrong: #ef4444; --text: #e2e8f0; --text-muted: #7c8db5;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
    .logo { font-size: 1.15rem; font-weight: 800; }
    .logo span { color: var(--accent); }
    .back-link { font-size: 0.8rem; color: var(--text-muted); text-decoration: none; transition: color .2s; }
    .back-link:hover { color: var(--accent); }

    .tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); }
    .tab { padding: 12px 20px; cursor: pointer; font-size: .9rem; color: var(--text-muted); border-bottom: 2px solid transparent; transition: all .2s; user-select: none; }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab:hover:not(.active) { color: var(--text); }

    main { flex: 1; padding: 24px; max-width: 860px; width: 100%; margin: 0 auto; }
    .panel { display: none; flex-direction: column; gap: 20px; }
    .panel.active { display: flex; }

    /* SELECTOR */
    .start-screen { display: flex; flex-direction: column; gap: 24px; padding: 8px 0; }
    .sel-label { font-size: .72rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 6px; display: block; }
    select.sel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 13px 16px; color: var(--text); font-size: .95rem; outline: none; cursor: pointer; transition: border-color .2s; width: 100%; }
    select.sel:focus { border-color: var(--accent); }
    .btn-start { width: 100%; padding: 16px; font-size: 1rem; border-radius: var(--radius); background: var(--accent); color: #fff; border: none; font-weight: 800; cursor: pointer; transition: all .2s; }
    .btn-start:hover { background: var(--accent-hover); box-shadow: 0 4px 20px rgba(108,99,255,.4); transform: translateY(-1px); }

    /* PROGRESS */
    .q-header { display: flex; justify-content: space-between; align-items: center; font-size: .8rem; color: var(--text-muted); }
    .progress-bar { height: 4px; background: var(--surface2); border-radius: 99px; overflow: hidden; margin-top: 6px; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 99px; transition: width .3s; }
    .score-live { color: var(--accent); font-weight: 700; }

    /* QUESTION CARD */
    .q-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px 24px; margin-top: 16px; }
    .q-tema-tag { font-size: .7rem; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 10px; }
    .q-text { font-size: 1.05rem; line-height: 1.65; margin-bottom: 22px; }

    /* OPTIONS */
    .options { display: flex; flex-direction: column; gap: 10px; }
    .opt-btn { display: flex; align-items: center; gap: 14px; padding: 14px 18px; border: 2px solid var(--border); border-radius: var(--radius); background: var(--surface2); color: var(--text); font-size: .9rem; font-weight: 500; cursor: pointer; transition: all .18s; text-align: left; }
    .opt-btn:hover:not(:disabled) { border-color: var(--accent); background: rgba(108,99,255,.08); color: var(--accent2); transform: translateX(3px); }
    .opt-btn:disabled { cursor: default; transform: none; }
    .opt-letter { flex-shrink: 0; width: 28px; height: 28px; border-radius: 7px; background: var(--surface); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: .8rem; font-weight: 800; color: var(--text-muted); transition: all .18s; }
    .opt-btn:hover:not(:disabled) .opt-letter { background: var(--accent); border-color: var(--accent); color: #fff; }
    .opt-btn.chosen-correct { border-color: var(--correct); background: rgba(34,197,94,.1); }
    .opt-btn.chosen-correct .opt-letter { background: var(--correct); border-color: var(--correct); color: #fff; }
    .opt-btn.chosen-wrong { border-color: var(--wrong); background: rgba(239,68,68,.1); }
    .opt-btn.chosen-wrong .opt-letter { background: var(--wrong); border-color: var(--wrong); color: #fff; }
    .opt-btn.show-correct { border-color: var(--correct); background: rgba(34,197,94,.06); }
    .opt-btn.show-correct .opt-letter { background: var(--correct); border-color: var(--correct); color: #fff; }

    /* FEEDBACK */
    .feedback { margin-top: 14px; border-radius: var(--radius); padding: 12px 16px; font-size: .85rem; font-weight: 600; display: none; }
    .feedback.show { display: block; }
    .feedback.correct { background: rgba(34,197,94,.08); border: 1px solid rgba(34,197,94,.2); color: var(--correct); }
    .feedback.wrong { background: rgba(239,68,68,.08); border: 1px solid rgba(239,68,68,.2); color: var(--wrong); }

    /* NAV */
    .q-nav { display: flex; justify-content: flex-end; gap: 10px; margin-top: 16px; }
    .btn { padding: 11px 22px; border: none; border-radius: var(--radius); font-size: .88rem; font-weight: 700; cursor: pointer; transition: all .2s; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

    /* RESULTS */
    .stats-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; }
    .stats-row { display: flex; justify-content: space-around; gap: 12px; flex-wrap: wrap; }
    .stat-item { text-align: center; }
    .stat-num { font-size: 2.2rem; font-weight: 800; letter-spacing: -1px; }
    .stat-lbl { font-size: .75rem; color: var(--text-muted); margin-top: 2px; }
    .c-num { color: var(--correct); } .w-num { color: var(--wrong); } .p-num { color: var(--accent2); }

    /* BANCO */
    .controls { display: flex; gap: 10px; flex-wrap: wrap; }
    .search-box { flex: 1; min-width: 180px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 14px; color: var(--text); font-size: .9rem; outline: none; transition: border-color .2s; }
    .search-box:focus { border-color: var(--accent); }
    .search-box::placeholder { color: var(--text-muted); }
    .cnt { font-size: .78rem; color: var(--text-muted); }
    .bank-list { display: flex; flex-direction: column; gap: 10px; }
    .bank-item { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px; }
    .bank-tema { font-size: .68rem; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
    .bank-q { font-size: .88rem; margin-bottom: 6px; }
    .bank-ans { font-size: .8rem; color: var(--correct); font-weight: 600; }

    .github-fab { position: fixed; bottom: 28px; right: 28px; display: flex; align-items: center; gap: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 99px; padding: 12px 20px 12px 16px; text-decoration: none; color: var(--text); font-size: .85rem; font-weight: 600; box-shadow: 0 4px 20px rgba(0,0,0,.4); transition: all .25s; z-index: 100; }
    .github-fab:hover { border-color: var(--accent); background: #1e1c35; color: var(--accent2); box-shadow: 0 0 0 3px rgba(108,99,255,.2), 0 0 24px rgba(108,99,255,.35); transform: translateY(-2px); }
    .github-fab svg { flex-shrink: 0; transition: transform .25s; }
    .github-fab:hover svg { transform: rotate(-8deg) scale(1.1); }

    @media (max-width: 560px) {
      .tabs { overflow-x: auto; }
      .stats-row { justify-content: center; gap: 20px; }
      .github-fab { bottom: 16px; right: 16px; }
    }
  </style>
</head>

Verdadero, para mejorar la eficiencia funcional.", "Falso, consiste en crear una doble cadena de mando (funcional y de mercado/proyecto).", "Falso, es una forma de agrupación por mercado con alta autonomía divisional.", "Verdadero, y es el principal mecanismo de coordinación."], "correct": 1}, {"tema": "Generalidades y Coordinación", "q": "¿Es la descentralización vertical de tipo paralelo exclusiva de las organizaciones cuyas unidades están agrupadas en base a mercado?", "opts": ["Verdadero.", "Falso, también puede darse en grandes agrupaciones funcionales descentralizadas.", "Falso, es más característica de la agrupación por producto.", "Verdadero, ya que facilita la autonomía de cada mercado."], "correct": 0}, {"tema": "Generalidades y Coordinación", "q": "En una organización, las actividades que contribuyen directamente a la materialización de su propósito o misión, ¿son realizadas por el núcleo de operaciones, la línea media y el ápice estratégico?", "opts": ["Verdadero.", "Falso, solo el núcleo de operaciones realiza actividades primarias directas.", "Falso, la tecnoestructura y el staff de apoyo también contribuyen directamente de forma primaria.", "Verdadero, formando la cadena de valor central de la organización."], "correct": 0}, {"tema": "Generalidades y Coordinación", "q": "En las adhocracias operativas, ¿tiene lugar el proceso de 'encasillamiento' (aplicación de un programa normativo a una contingencia)?", "opts": ["Verdadero, para estandarizar las soluciones innovadoras.", "Falso, el 'encasillamiento' es típico de la burocracia profesional; la adhocracia busca soluciones creativas y singulares.", "Falso, el 'encasillamiento' ocurre en la burocracia maquinal para tareas rutinarias.", "Verdadero, pero solo si el cliente lo solicita explícitamente."], "correct": 1}, {"tema": "Generalidades y Coordinación", "q": "En la burocracia profesional, los profesionales se concentran en el núcleo de operaciones trabajando independientemente, mientras que en la adhocracia, se reparten por toda la estructura trabajando también de forma independiente.", "opts": ["Verdadero.", "Falso, en la adhocracia los profesionales suelen trabajar en equipos interdependientes.", "Falso, en la burocracia profesional hay una alta interdependencia.", "Verdadero, la independencia es clave en ambos casos para la especialización."], "correct": 0}, {"tema": "Generalidades y Coordinación", "q": "Debido a su dependencia de la adaptación mutua, ¿puede la organización misionaria considerarse una 'adhocracia ideológica'?", "opts": ["Verdadero, la adaptación mutua es clave en su ideología.", "Falso, debido a su dependencia de la normalización de valores, se considera una 'burocracia ideológica'.", "Falso, la organización misionaria depende principalmente de la supervisión directa.", "Verdadero, si su misión es altamente innovadora."], "correct": 1}, {"tema": "Generalidades y Coordinación", "q": "Si una organización enfrenta un entorno complejo y estable, ¿no podrá recurrir a la normalización como mecanismo de coordinación fundamental?", "opts": ["Verdadero, un entorno complejo siempre requiere adaptación mutua.", "Falso, un entorno complejo y estable favorece una estructura descentralizada y burocrática, siendo la normalización de habilidades un mecanismo adecuado.", "Falso, siempre se puede usar la normalización de procesos.", "Verdadero, la estabilidad no permite la normalización en entornos complejos."], "correct": 1}, {"tema": "Generalidades y Coordinación", "q": "Una organización descentralizada vertical y horizontalmente de forma selectiva, ¿coordina su toma de decisiones principalmente mediante la normalización de los resultados?", "opts": ["Verdadero, es la forma más eficiente de controlar unidades descentralizadas.", "Falso, coordinará su toma de decisiones diseñando constelaciones de trabajo que se coordinan mediante adaptación mutua.", "Falso, recurrirá principalmente a la normalización de procesos para asegurar la consistencia.", "Verdadero, si las unidades descentralizadas operan en mercados diferentes."], "correct": 1}, {"tema": "Generalidades y Coordinación", "q": "¿Pueden algunas organizaciones de gran tamaño adoptar temporalmente una forma estructural simple si un entorno extremadamente hostil las obliga a centralizarse?", "opts": ["Verdadero.", "Falso, las organizaciones grandes no pueden revertir a una forma simple.", "Falso, un entorno hostil siempre conduce a una mayor complejidad estructural, como la adhocracia.", "Verdadero, pero solo si la cultura organizacional es muy fuerte."], "correct": 0}, {"tema": "Generalidades y Coordinación", "q": "El tamaño de la unidad (tramo de control), ¿puede aumentar con la utilización de la normalización de conocimientos y habilidades, especialmente en tareas complejas independientes?", "opts": ["Verdadero.", "Falso, la normalización de habilidades siempre reduce el tamaño de la unidad para permitir una supervisión más cercana.", "Falso, esto solo aplica a la normalización de procesos en tareas simples.", "Verdadero, pero solo si los profesionales tienen poca experiencia."], "correct": 0}, {"tema": "Generalidades y Coordinación", "q": "Un sistema técnico regulador, ¿define unos puestos muy ampliados en su dimensión vertical?", "opts": ["Verdadero, para dar flexibilidad ante la regulación.", "Falso, define puestos especializados en la dimensión vertical, ya que se tiene control sobre el contenido de los mismos.", "Falso, define puestos ampliados horizontalmente pero especializados verticalmente.", "Verdadero, y también ampliados horizontalmente."], "correct": 1}, {"tema": "Generalidades y Coordinación", "q": "Tanto la forma divisional como la burocracia profesional, ¿presentan una fuerte descentralización vertical y horizontal?", "opts": ["Verdadero, ambas presentan descentralización vertical y horizontal, siendo la B. Profesional más descentralizada horizontalmente que la F. Divisional (que tiene descentralización vertical limitada a directores de división).", "Falso, la forma divisional es fuertemente centralizada verticalmente.", "Falso, la burocracia profesional es fuertemente centralizada horizontalmente.", "Verdadero, pero solo la forma divisional presenta fuerte descentralización en ambas dimensiones."], "correct": 0}, {"tema": "Generalidades y Coordinación", "q": "Los puestos profesionales, ¿se caracterizan por una alta especialización horizontal (basada en el número de tareas) y una alta especialización vertical?", "opts": ["Verdadero, para asegurar un control estricto.", "Falso, se caracterizan por alta especialización horizontal (basada en conocimientos) y alta ampliación vertical (baja especialización vertical).", "Falso, tienen baja especialización horizontal y alta ampliación vertical.", "Verdadero, y además requieren poca preparación formal."], "correct": 1}, {"tema": "Generalidades y Coordinación", "q": "¿Suelen las organizaciones sometidas a una fuerte normalización de procesos estar poco descentralizadas verticalmente?", "opts": ["Verdadero.", "Falso, una fuerte normalización de procesos implica necesariamente una alta descentralización vertical.", "Falso, no existe una relación directa entre normalización de procesos y el grado de descentralización vertical.", "Verdadero, pero solo si la tecnoestructura es pequeña y poco influyente."], "correct": 0}, {"tema": "Generalidades y Coordinación", "q": "Las organizaciones conversoras, ¿son organizaciones misionarias que intentan cambiar la sociedad cambiando la conducta de sus propios miembros de acuerdo con su misión?", "opts": ["Verdadero.", "Falso, esta descripción corresponde a las organizaciones reformadoras.", "Falso, las organizaciones conversoras se enfocan en cambiar el entorno externo directamente.", "Verdadero, y siempre son de naturaleza religiosa o política."], "correct": 0}, {"tema": "Generalidades y Coordinación", "q": "En la burocracia maquinal, ¿se cumplen las hipótesis de congruencia porque la estabilidad de su entorno y el carácter regulador de su sistema técnico son compatibles con la alta formalización del comportamiento de su núcleo de operaciones?", "opts": ["Verdadero.", "Falso, la burocracia maquinal es más congruente en entornos dinámicos.", "Falso, el sistema técnico regulador es incompatible con la alta formalización.", "Verdadero, pero la formalización del comportamiento es típicamente baja."], "correct": 0}, {"tema": "Generalidades y Coordinación", "q": "Las etapas de transición hacia la forma divisional son: ¿la forma divisional simple, la socializada, la múltiple y la conglomerada?", "opts": ["Verdadero, en ese orden exacto.", "Falso, serían la forma integrada, la forma de los subproductos, la forma de los productos relacionados y la forma conglomerada.", "Falso, solo existen la forma integrada y la conglomerada como etapas de transición.", "Verdadero, aunque el orden puede variar según la industria."], "correct": 1}, {"tema": "Generalidades y Coordinación", "q": "¿Introducen la planificación de acciones y el control del rendimiento el mecanismo de normalización de procesos, mientras que los dispositivos de enlace introducen la supervisión directa y la adaptación mutua?", "opts": ["Verdadero.", "Falso, la planificación de acciones y el control del rendimiento introducen la normalización de resultados; los dispositivos de enlace introducen solo la adaptación mutua.", "Falso, la planificación de acciones introduce la normalización de habilidades y el control de rendimiento la normalización de valores.", "Verdadero, y son los únicos mecanismos que estos parámetros pueden introducir."], "correct": 1}, {"tema": "Configuraciones: Estructura Simple", "q": "La Teoría Contingente, ¿enfatiza en la importancia de diseñar una estructura óptima, válida para todas las empresas independientemente del momento y la situación?", "opts": ["Verdadero, busca un 'one best way'.", "Falso, resalta la importancia de diseñar una estructura diferente según los factores situacionales que afecten a cada empresa.", "Falso, enfatiza la estructura matricial como óptima universal.", "Verdadero, pero solo para pequeñas empresas."], "correct": 1}, {"tema": "Configuraciones: Estructura Simple", "q": "Las estructuras simples, ¿se caracterizan por un entorno dinámico, donde la variabilidad asociada favorece una estructura más orgánica?", "opts": ["Verdadero, la variabilidad es clave para la organicidad.", "Falso, un entorno dinámico implica impredecibilidad, no necesariamente variabilidad que favorezca la organicidad de esta forma.", "Falso, las estructuras simples siempre operan en entornos estables.", "Verdadero, y siempre son altamente formalizadas."], "correct": 1}, {"tema": "Configuraciones: Estructura Simple", "q": "Uno de los inconvenientes de la estructura simple, ¿está relacionado con el riesgo de desequilibrio entre estrategia y operaciones si el director general se centra solo en uno de estos aspectos?", "opts": ["Verdadero.", "Falso, la estructura simple no tiene problemas de desequilibrio.", "Falso, este problema es más común en la forma divisional.", "Verdadero, pero solo si el director general carece de experiencia."], "correct": 0}, {"tema": "Configuraciones: Estructura Simple", "q": "En la estructura simple, ¿es el flujo de trabajo poco flexible debido a que el núcleo de operaciones realiza tareas poco especializadas?", "opts": ["Verdadero, la falta de especialización reduce la flexibilidad.", "Falso, es muy flexible porque las tareas son intercambiables y poco especializadas.", "Falso, el flujo de trabajo es rígido debido a la alta formalización.", "Verdadero, y se coordina principalmente por normalización de procesos."], "correct": 1}, {"tema": "Configuraciones: Estructura Simple", "q": "La configuración estructural simple, ¿posee un escaso nivel de riesgo al ser estructuras pequeñas, poco elaboradas, guiadas claramente por una o pocas personas?", "opts": ["Verdadero, su simplicidad reduce el riesgo.", "Falso, es la más arriesgada, ya que todo recae en el Ápice Estratégico; si este falla, la empresa peligra.", "Falso, el riesgo es moderado y comparable al de otras estructuras.", "Verdadero, pero solo en mercados muy estables."], "correct": 1}, {"tema": "Configuraciones: Estructura Simple", "q": "En la estructura simple, ¿son la especialización, la normalización de procesos de trabajo y la preparación parámetros de diseño muy poco utilizados?", "opts": ["Verdadero para todos ellos.", "Falso, aunque la especialización y preparación son bajas, la normalización de procesos no es un parámetro de diseño fundamental aquí (la coordinación es por supervisión directa).", "Falso, la especialización es alta y la preparación también.", "Verdadero, excepto la preparación que es moderada."], "correct": 0}, {"tema": "Configuraciones: Estructura Simple", "q": "Las estructuras simples, ¿poseen un entorno sencillo y dinámico, lo cual facilita estructuras orgánicas y poder centralizado respectivamente?", "opts": ["Verdadero, esa es la correspondencia correcta.", "Falso, es al revés: entorno sencillo facilita la centralización y entorno dinámico facilita la estructura orgánica.", "Falso, un entorno dinámico siempre lleva a descentralización.", "Verdadero, y siempre usan normalización de habilidades."], "correct": 1}, {"tema": "Configuraciones: Estructura Simple", "q": "Las estructuras orgánicas como la estructura simple, caracterizadas por relaciones informales, ¿necesitan usar mecanismos flexibles como la normalización de conocimientos y/o la supervisión directa?", "opts": ["Verdadero, ambos son necesarios.", "Falso, en la estructura simple se utiliza principalmente la supervisión directa; la normalización (de conocimientos) no es característica de su organicidad.", "Falso, las estructuras orgánicas siempre usan adaptación mutua exclusivamente.", "Verdadero, pero la supervisión directa es secundaria."], "correct": 1}, {"tema": "Configuraciones: Estructura Simple", "q": "En la estructura simple, ¿es el núcleo de operaciones la parte más importante debido a la división poco estricta del trabajo y la facilidad para intercambiar tareas?", "opts": ["Verdadero, la flexibilidad del núcleo es clave.", "Falso, la parte más importante es el Ápice Estratégico, sin el cual la empresa no puede funcionar.", "Falso, la tecnoestructura es la más importante por su rol de diseño.", "Verdadero, si el entorno es muy dinámico."], "correct": 1}, {"tema": "Configuraciones: Estructura Simple", "q": "La estructura simple, ¿se caracteriza por tener una estructura poco elaborada con parámetros de diseño poco desarrollados?", "opts": ["Verdadero.", "Falso, tiene una estructura muy elaborada pero flexible.", "Falso, sus parámetros de diseño son altamente desarrollados, especialmente la formalización.", "Verdadero, pero con una tecnoestructura muy desarrollada."], "correct": 0}, {"tema": "Configuraciones: Burocracia Maquinal", "q": "Una causa de la centralización del poder en el ápice estratégico en las burocracias maquinales, ¿está relacionada con problemas de coordinación en la línea media debido a la alta especialización en el núcleo de operaciones?", "opts": ["Verdadero.", "Falso, la centralización se debe a la simplicidad del entorno.", "Falso, la línea media tiene alta capacidad de coordinación en esta estructura.", "Verdadero, pero solo si la tecnoestructura es débil."], "correct": 0}, {"tema": "Configuraciones: Burocracia Maquinal", "q": "El principal parámetro de diseño utilizado en la burocracia maquinal, ¿hace referencia a la fuerte división del trabajo en el núcleo de operaciones?", "opts": ["Verdadero, es la base de su eficiencia.", "Falso, el principal parámetro es la formalización del comportamiento, que introduce el mecanismo de normalización de procesos.", "Falso, es la normalización de habilidades de los operarios.", "Verdadero, junto con una baja especialización vertical."], "correct": 1}, {"tema": "Configuraciones: Burocracia Maquinal", "q": "La burocracia maquinal, ¿suele identificarse con sistemas técnicos poco reguladores, dado que estos 'rutinizan' el trabajo permitiendo su normalización?", "opts": ["Verdadero, los sistemas poco reguladores facilitan la rutina.", "Falso, se identifica con sistemas técnicos muy reguladores, puesto que estos condicionan la forma de trabajo del Núcleo de Operaciones.", "Falso, el grado de regulación del sistema técnico es irrelevante.", "Verdadero, pero solo si el entorno es estable."], "correct": 1}, {"tema": "Configuraciones: Burocracia Maquinal", "q": "Una condición típica de las burocracias maquinales, ¿suele ser la existencia de un elevado control externo, lo que lleva a la organización a centralizar decisiones y formalizar su estructura?", "opts": ["Verdadero.", "Falso, el control externo fomenta la descentralización y la flexibilidad.", "Falso, el control externo solo afecta al ápice estratégico.", "Verdadero, pero solo en organizaciones de gran tamaño."], "correct": 0}, {"tema": "Configuraciones: Burocracia Maquinal", "q": "Cuando una burocracia maquinal incrementa sobremanera su tamaño, ¿la organización utiliza solamente la integración vertical hacia atrás para mantener la estabilidad de su entorno?", "opts": ["Verdadero, es la única estrategia viable.", "Falso, utiliza tanto la integración vertical hacia delante como hacia detrás.", "Falso, recurre a la diversificación en lugar de la integración vertical.", "Verdadero, pero solo si el mercado de proveedores es inestable."], "correct": 1}, {"tema": "Configuraciones: Burocracia Maquinal", "q": "La existencia de una fuerte formalización del comportamiento en las burocracias maquinales, ¿supone un gran desarrollo de la tecnoestructura al introducir como mecanismo de coordinación la normalización de los resultados?", "opts": ["Verdadero, la tecnoestructura define los resultados esperados.", "Falso, supone un gran desarrollo de la tecnoestructura, pero esta introduce como mecanismo de coordinación la normalización de procesos.", "Falso, la formalización del comportamiento reduce la necesidad de una tecnoestructura grande.", "Verdadero, y también la normalización de habilidades."], "correct": 1}, {"tema": "Configuraciones: Burocracia Maquinal", "q": "En la burocracia maquinal, ¿la tecnoestructura posee un elevado poder jerárquico, lo que lleva a cierta descentralización horizontal selectiva y limitada?", "opts": ["Verdadero, su poder jerárquico es formal.", "Falso, la tecnoestructura posee un poder informal (de experto), aunque sí puede haber descentralización horizontal selectiva y limitada hacia ella.", "Falso, la tecnoestructura no tiene poder significativo en esta configuración.", "Verdadero, y una descentralización vertical completa."], "correct": 1}, {"tema": "Configuraciones: Burocracia Maquinal", "q": "En la burocracia maquinal, ¿la línea media se compone de una amplia jerarquía de gerentes agrupados funcionalmente, que controlan el trabajo especializado del núcleo de operaciones?", "opts": ["Verdadero.", "Falso, la línea media es reducida y se agrupa por mercado.", "Falso, el control del núcleo de operaciones recae directamente en el ápice estratégico.", "Verdadero, pero su principal función es la adaptación mutua."], "correct": 0}, {"tema": "Configuraciones: Burocracia Maquinal", "q": "Una función característica de la línea media en las burocracias maquinales, ¿es servir de enlace entre el núcleo de operaciones y la tecnoestructura, para que los trabajadores sepan qué trabajo hacer?", "opts": ["Verdadero.", "Falso, esta función de enlace la realiza el staff de apoyo.", "Falso, la línea media se enfoca solo en la supervisión directa sin enlace con la tecnoestructura.", "Verdadero, y también entre el ápice y el núcleo."], "correct": 0}, {"tema": "Configuraciones: Burocracia Maquinal", "q": "La centralización de la burocracia maquinal, ¿hace que los problemas asciendan hasta la parte superior de la estructura, sobrecargándola si la dirección intermedia no puede resolver problemas imprevistos no regulados?", "opts": ["Verdadero.", "Falso, la dirección intermedia siempre resuelve todos los problemas.", "Falso, la estructura es tan formalizada que no surgen problemas imprevistos.", "Verdadero, pero la sobrecarga es mínima gracias a la eficiencia."], "correct": 0}, {"tema": "Configuraciones: Burocracia Maquinal", "q": "En la burocracia maquinal, ¿existe una descentralización vertical y una descentralización horizontal selectiva y limitada para la toma de decisiones?", "opts": ["Verdadero (Tipo D).", "Falso, existe una centralización vertical y una descentralización horizontal selectiva y limitada (Tipo B).", "Falso, existe una centralización total (Tipo A).", "Verdadero, pero solo en la tecnoestructura (Tipo C)."], "correct": 1}, {"tema": "Configuraciones: Burocracia Maquinal", "q": "La burocracia maquinal, ¿necesita apoyarse en una gran tecnoestructura para diseñar y mantener sus sistemas de estandarización, sin los cuales sería imposible formalizar los comportamientos en su núcleo de operaciones?", "opts": ["Verdadero.", "Falso, la tecnoestructura es pequeña y el ápice se encarga de la estandarización.", "Falso, la formalización se logra mediante la supervisión directa, no por sistemas de estandarización.", "Verdadero, pero el staff de apoyo es más importante que la tecnoestructura."], "correct": 0}, {"tema": "Configuraciones: Burocracia Profesional", "q": "En la estructura profesional, dado que la normalización es esencial en el núcleo de operaciones, ¿es la tecnoestructura (encargada de elaborar las normas) la parte más importante?", "opts": ["Verdadero, la tecnoestructura define todas las normas.", "Falso, la parte más importante es el Núcleo de Operaciones (NO). Las normas surgen, generalmente, en asociaciones profesionales externas, no en la tecnoestructura interna.", "Falso, la parte más importante es el ápice estratégico.", "Verdadero, si las normas son muy complejas."], "correct": 1}, {"tema": "Configuraciones: Burocracia Profesional", "q": "En la burocracia profesional, ¿el núcleo de operaciones presta una atención estricta a las normas sin preocupación real por el cliente, fomentando buropatologías?", "opts": ["Verdadero, la adherencia a la norma es prioritaria.", "Falso, la preocupación principal es servir al cliente buscando la estrategia (norma profesional) mejor que se adapte a cada caso.", "Falso, las buropatologías son exclusivas de la burocracia maquinal.", "Verdadero, a menos que el cliente sea de alto valor."], "correct": 1}, {"tema": "Configuraciones: Burocracia Profesional", "q": "La burocracia profesional, ¿es una estructura centralizada verticalmente y descentralizada horizontalmente?", "opts": ["Verdadero (Tipo C).", "Falso, es descentralizada tanto vertical como horizontalmente (Tipo D).", "Falso, es completamente centralizada (Tipo A).", "Verdadero, pero con alta formalización (Tipo B)."], "correct": 1}, {"tema": "Configuraciones: Burocracia Profesional", "q": "El proceso de 'encasillamiento' típico de la burocracia profesional, ¿permite contener la incertidumbre en el servicio al cliente dentro de cada puesto de trabajo?", "opts": ["Verdadero.", "Falso, el 'encasillamiento' aumenta la incertidumbre al limitar las opciones.", "Falso, este proceso es típico de la adhocracia.", "Verdadero, pero solo para clientes recurrentes."], "correct": 0}, {"tema": "Configuraciones: Burocracia Profesional", "q": "La complejidad del trabajo inherente a los puestos profesionales y la demanda en este tipo de trabajos, ¿provoca una centralización vertical y una descentralización horizontal?", "opts": ["Verdadero, para asegurar el control de calidad.", "Falso, provoca tanto descentralización vertical como horizontal.", "Falso, provoca una centralización total.", "Verdadero, si los profesionales son externos."], "correct": 1}, {"tema": "Configuraciones: Burocracia Profesional", "q": "La burocracia profesional, ¿se caracteriza por tener una estructura no democrática en el staff de apoyo basada en el poder del experto?", "opts": ["Verdadero, el conocimiento experto domina.", "Falso, la estructura en el staff de apoyo suele ser más burocrática y basada en el poder del puesto, no necesariamente no democrática o basada solo en expertos.", "Falso, el staff de apoyo es siempre democrático.", "Verdadero, y el staff de apoyo es muy grande."], "correct": 1}, {"tema": "Configuraciones: Burocracia Profesional", "q": "El proceso de 'encasillamiento', ¿establece que, ante una posible contingencia, el profesional pueda aplicar una secuencia normativa para solventarla?", "opts": ["Verdadero, define una secuencia fija.", "Falso, el 'encasillamiento' implica diagnosticar la contingencia para aplicar un programa normativo estándar, no una secuencia única.", "Falso, esto describe la formalización de procesos.", "Verdadero, y siempre es la misma secuencia."], "correct": 1}, {"tema": "Configuraciones: Burocracia Profesional", "q": "La formulación de estrategias en la burocracia profesional, ¿es un proceso descendente que emana de los directivos profesionales propios en estas estructuras?", "opts": ["Verdadero, los directivos marcan la pauta.", "Falso, sería un proceso más ascendente o emergente, influenciado por los profesionales del núcleo y asociaciones externas.", "Falso, la estrategia la define la tecnoestructura.", "Verdadero, pero con consulta al núcleo de operaciones."], "correct": 1}, {"tema": "Configuraciones: Burocracia Profesional", "q": "Una diferencia entre la burocracia maquinal (BM) y la profesional (BP) radica en el tipo de trabajo del núcleo de operaciones: ¿En la BM es sencillo, racionalizado y repetitivo, y en la BP es complejo, no racionalizado y menos repetitivo?", "opts": ["Verdadero.", "Falso, en la BP el trabajo también es sencillo y repetitivo.", "Falso, en la BM el trabajo es complejo pero repetitivo.", "Verdadero, pero la BM es más flexible."], "correct": 0}, {"tema": "Configuraciones: Burocracia Profesional", "q": "Mientras que en las burocracias maquinales (BM) existe especialización horizontal de puestos, ¿en las burocracias profesionales (BP) existe ampliación horizontal, al ser profesionales que ejecutan un trabajo complejo?", "opts": ["Verdadero, la complejidad impide la especialización horizontal.", "Falso, ambas son especializadas horizontalmente; la BM por tareas y la BP por conocimientos/habilidades.", "Falso, la BM tiene ampliación horizontal y la BP especialización.", "Verdadero, y la BP tiene baja especialización vertical."], "correct": 1}, {"tema": "Configuraciones: Burocracia Profesional", "q": "En las burocracias profesionales, el trabajo de operaciones es complejo y no racionalizado. ¿Esto genera que el principal parámetro de diseño sea la normalización de conocimiento y habilidades?", "opts": ["Verdadero, es la forma de asegurar la calidad.", "Falso, el principal parámetro de diseño sería la preparación (que introduce la normalización de habilidades).", "Falso, el principal parámetro es la adaptación mutua.", "Verdadero, junto con una alta formalización del comportamiento."], "correct": 1}, {"tema": "Configuraciones: Org. Misionaria", "q": "La organización misionaria, ¿se asemeja a la estructura simple en aspectos como su falta de elaboración y sencillez en la configuración estructural?", "opts": ["Verdadero.", "Falso, la organización misionaria es altamente elaborada y compleja.", "Falso, se asemeja más a la burocracia profesional.", "Verdadero, pero es mucho más formalizada."], "correct": 0}, {"tema": "Configuraciones: Org. Misionaria", "q": "Los mecanismos de coordinación característicos de la organización misionaria son: ¿normalización de valores y supervisión directa?", "opts": ["Verdadero, ambos son esenciales.", "Falso, son la normalización de valores y la adaptación mutua (la supervisión directa no es característica).", "Falso, son la normalización de habilidades y el adoctrinamiento.", "Verdadero, y también la normalización de procesos."], "correct": 1}, {"tema": "Configuraciones: Org. Misionaria", "q": "La cultura organizativa, ¿es bastante débil cuando la identificación con ésta surge exclusivamente del adoctrinamiento o de forma calculada?", "opts": ["Verdadero.", "Falso, el adoctrinamiento y la identificación calculada crean culturas muy fuertes.", "Falso, la debilidad cultural solo surge por falta de liderazgo.", "Verdadero, a menos que el adoctrinamiento sea muy intenso."], "correct": 0}, {"tema": "Configuraciones: Org. Misionaria", "q": "La organización misionaria, ¿se caracteriza por emplear parámetros de diseño como la descentralización total, preparación y adoctrinamiento de sus miembros?", "opts": ["Verdadero para todos ellos.", "Falso, la preparación no es característica de este tipo de organizaciones; sí lo son la descentralización (total o amplia) y el adoctrinamiento.", "Falso, es altamente centralizada y usa formalización.", "Verdadero, y también la normalización de procesos."], "correct": 1}, {"tema": "Configuraciones: Org. Misionaria", "q": "En la organización misionaria, el sistema técnico no puede ser muy sofisticado para no delegar el poder concretamente en la tecnoestructura, debilitando la igualdad en la organización.", "opts": ["Verdadero, la sofisticación técnica daría poder a la tecnoestructura.", "Falso, el riesgo sería delegar poder concretamente en el staff de apoyo (si el sistema técnico fuera muy sofisticado), no en la tecnoestructura.", "Falso, el sistema técnico debe ser sofisticado para apoyar la misión.", "Verdadero, y tampoco puede ser muy regulador."], "correct": 1}, {"tema": "Configuraciones: Org. Misionaria", "q": "Las organizaciones conversoras, ¿buscan transformar la sociedad de forma directa mientras que las organizaciones reformadoras lo hacen de forma indirecta?", "opts": ["Verdadero, esa es la distinción.", "Falso, sería al revés: las reformadoras buscan transformar la sociedad directamente (cambiando a sus miembros) y las conversoras indirectamente (cambiando la sociedad).", "Falso, ambas buscan transformar la sociedad de forma directa.", "Verdadero, y las conversoras son siempre más pequeñas."], "correct": 0}, {"tema": "Configuraciones: Forma Divisional", "q": "En la forma divisional, la sede central permite gran autonomía a las divisiones, controlando sus resultados. Por tanto, ¿el principal mecanismo de coordinación es la normalización de outputs y sus principales parámetros la planificación de acciones y el control del rendimiento?", "opts": ["Verdadero, todos los elementos son correctos.", "Falso, el principal mecanismo sí es la normalización de outputs (vía control del rendimiento), pero la planificación de acciones no es un parámetro de diseño principal para este mecanismo, sino para la normalización de procesos.", "Falso, el principal mecanismo es la supervisión directa desde la sede.", "Verdadero, y las divisiones son completamente autónomas."], "correct": 1}, {"tema": "Configuraciones: Forma Divisional", "q": "Una ventaja de la forma divisional es la reducción de riesgos. ¿Es esta característica especialmente importante en la forma integrada o en la forma de subproductos?", "opts": ["Verdadero para ambas.", "Falso, la reducción de riesgos por diversificación es especialmente importante en la forma conglomerada (divisiones independientes en negocios no relacionados).", "Falso, la reducción de riesgos no es una ventaja significativa de la forma divisional.", "Verdadero, y también en la forma de productos relacionados."], "correct": 1}, {"tema": "Configuraciones: Forma Divisional", "q": "En la forma divisional, ¿las divisiones dirigen los negocios de forma prácticamente autónoma, lo que supone una descentralización limitada para los directores de la división?", "opts": ["Verdadero.", "Falso, las divisiones no son autónomas, están estrictamente controladas por la sede.", "Falso, la descentralización es completa, no limitada.", "Verdadero, pero solo en divisiones muy rentables."], "correct": 0}, {"tema": "Configuraciones: Forma Divisional", "q": "En la forma divisional, ¿la sede central dirige la estrategia corporativa (cartera de negocios) mientras que las divisiones dirigen las estrategias de los negocios individuales?", "opts": ["Verdadero.", "Falso, la sede central dirige todas las estrategias, corporativas y de negocio.", "Falso, las divisiones dirigen la estrategia corporativa y la sede la de los negocios.", "Verdadero, pero la sede no interviene en la cartera de negocios."], "correct": 0}, {"tema": "Configuraciones: Forma Divisional", "q": "La estructura que surge cuando una organización establece divisiones regionales idénticas y concentra funciones críticas en la sede central, ¿es conocida como forma divisional personalizada?", "opts": ["Verdadero, es una personalización de la forma divisional.", "Falso, sería la 'burocracia duplicada' (mezcla de burocracia maquinal en las divisiones y forma divisional), típica del sector servicios o fabricación con unidades replicadas.", "Falso, se denomina forma divisional geográfica pura.", "Verdadero, y es muy flexible."], "correct": 1}, {"tema": "Configuraciones: Forma Divisional", "q": "El principal factor contingente de la forma divisional, ¿es el entorno, concretamente sus dimensiones de sencillez y estabilidad?", "opts": ["Verdadero, un entorno sencillo y estable la favorece.", "Falso, el principal factor contingente es la diversificación de mercados o productos.", "Falso, es el tamaño de la organización.", "Verdadero, y también la tecnología utilizada."], "correct": 1}, {"tema": "Configuraciones: Forma Divisional", "q": "La parte principal de la forma divisional, ¿es la sede central, encargada de establecer el control del rendimiento junto a la tecnoestructura?", "opts": ["Verdadero, la sede y su tecnoestructura son clave.", "Falso, la parte más importante son los directivos de la Línea Media (directores de división), que gestionan sus divisiones como 'mini-directores'.", "Falso, es el núcleo de operaciones de cada división.", "Verdadero, y la tecnoestructura es muy grande."], "correct": 1}, {"tema": "Configuraciones: Forma Divisional", "q": "La dispersión y duplicación de funciones operativas típica de la forma divisional, ¿minimiza la interdependencia entre divisiones, permitiendo que funcionen como entidades semiautónomas sin necesidad de coordinarse entre sí?", "opts": ["Verdadero.", "Falso, la interdependencia entre divisiones es alta y requiere mucha coordinación.", "Falso, las funciones no se duplican, se centralizan en la sede.", "Verdadero, pero solo si las divisiones son geográficamente distantes."], "correct": 0}, {"tema": "Configuraciones: Forma Divisional", "q": "En la forma divisional, ¿es obligado que las diferentes divisiones se estructuren como burocracias maquinales?", "opts": ["Verdadero, es un requisito para el control de la sede.", "Falso, pueden adoptar cualquier forma, aunque suelen tender hacia burocracias maquinales debido a la necesidad de estandarización para el control de rendimiento.", "Falso, siempre se estructuran como adhocracias.", "Verdadero, y deben ser idénticas en estructura."], "correct": 1}, {"tema": "Configuraciones: Forma Divisional", "q": "La forma divisional, ¿se compone de una serie de unidades totalmente autónomas (divisiones) acopladas mediante una estructura administrativa central (sede central)?", "opts": ["Verdadero, la autonomía es total.", "Falso, serían semi-autónomas, ya que el Ápice Estratégico (sede central) mantiene el control, principalmente mediante la normalización de resultados.", "Falso, las unidades no son autónomas, están integradas funcionalmente.", "Verdadero, y la sede central tiene un rol meramente consultivo."], "correct": 1}, {"tema": "Configuraciones: Adhocracia", "q": "La adhocracia, ¿soluciona problemas a la medida, siendo incapaz de normalizar y, por tanto, de ser eficiente en términos de costes estándar?", "opts": ["Verdadero.", "Falso, la adhocracia es altamente eficiente debido a su flexibilidad.", "Falso, puede normalizar sus soluciones una vez desarrolladas.", "Verdadero, pero es muy eficaz en la innovación."], "correct": 0}, {"tema": "Configuraciones: Adhocracia", "q": "La adhocracia operativa, ¿realiza proyectos para servirse a sí misma?", "opts": ["Verdadero, se enfoca en la mejora interna.", "Falso, la adhocracia operativa realiza proyectos para clientes externos; la adhocracia administrativa se enfocaría más en proyectos internos o para sí misma.", "Falso, realiza proyectos para el ápice estratégico.", "Verdadero, y no interactúa con clientes."], "correct": 1}, {"tema": "Configuraciones: Adhocracia", "q": "Los principales mecanismos de coordinación en la adhocracia son: ¿la adaptación mutua y la normalización de conocimientos y habilidades, al formar parte de ésta puestos profesionales?", "opts": ["Verdadero, ambos son fundamentales.", "Falso, el principal (y a veces único) mecanismo es la adaptación mutua; aunque haya profesionales, la naturaleza interdependiente y novedosa del trabajo dificulta la normalización de habilidades como mecanismo dominante.", "Falso, es la supervisión directa y la normalización de resultados.", "Verdadero, y la normalización de procesos es secundaria."], "correct": 1}, {"tema": "Configuraciones: Adhocracia", "q": "Los puestos de la adhocracia, ¿se caracterizan por una escasa formalización del comportamiento, elevada especialización horizontal y elevada preparación?", "opts": ["Verdadero.", "Falso, la formalización es alta para asegurar la calidad.", "Falso, la especialización horizontal es baja para fomentar la polivalencia.", "Verdadero, pero la preparación es baja, se aprende sobre la marcha."], "correct": 0}, {"tema": "Configuraciones: Adhocracia", "q": "La descentralización selectiva horizontal y vertical (Tipo D), ¿es típica de las adhocracias, donde el poder de decisión se distribuye entre directivos y no directivos según la naturaleza de las decisiones?", "opts": ["Verdadero.", "Falso, la adhocracia es centralizada en el ápice estratégico.", "Falso, es de Tipo C (descentralización horizontal limitada).", "Verdadero, pero solo en la adhocracia operativa."], "correct": 0}, {"tema": "Configuraciones: Adhocracia", "q": "Una empresa de consultoría que trata cada contrato del cliente como un reto creativo, ¿funciona como una burocracia profesional, mientras que si tratara el contrato como la necesidad de reforzar el sistema de planificación del cliente, funcionaría como una adhocracia?", "opts": ["Verdadero, esa es la distinción correcta.", "Falso, sería al revés: el reto creativo es adhocrático, y reforzar un sistema con un programa estándar es más burocrático-profesional.", "Falso, ambos casos son ejemplos de adhocracia.", "Verdadero, pero solo si la consultora es pequeña."], "correct": 1}, {"tema": "Configuraciones: Adhocracia", "q": "En las adhocracias, los directivos de línea, ¿constituyen una figura jerárquica que establece reglas estrictas, supervisa el trabajo y ofrece opiniones constructivas a los equipos?", "opts": ["Verdadero, su rol es de control tradicional.", "Falso, en la adhocracia no hay reglas estrictas impuestas por directivos de línea de forma tradicional; suelen ser parte de los equipos de proyecto, más como coordinadores o expertos que como supervisores jerárquicos clásicos.", "Falso, no existen directivos de línea en la adhocracia.", "Verdadero, y son los responsables de la innovación."], "correct": 1}, {"tema": "Organización de la Empresa", "q": "¿En qué parte de la organización estamos seguros de que nunca va a haber un puesto directivo?", "opts": ["Línea media", "Núcleo de operaciones", "Tecnoestructura", "Staff de apoyo"], "correct": 1}, {"tema": "Organización de la Empresa", "q": "Marque la opción correcta:", "opts": ["Las unidades de línea se encargan de prestar soporte y ayuda para que las actividades primarias de la cadena de valor se realicen con éxito. (staff de apoyo)", "Los analistas del staff de apoyo se encargan de normalizar los procesos habilidades y outputs de la organización. (tecnoestructura)", "La tecnoestructura, el staff de apoyo y la línea media se consideran unidades de línea.", "El staff de apoyo se encarga de realizar parte de las actividades secundarias de la cadena de valor, al margen del flujo fundamental del trabajo operativo."], "correct": 3}, {"tema": "Diseño de Puestos", "q": "¿Qué dispositivos de enlace consiste en un conjunto de trabajadores que son convocados para cumplir una determinada tarea y se desagraga tras su cumplimiento?", "opts": ["Puestos de enlace.", "Grupos de trabajo.", "Directivos integradores.", "Estructura matricial permanente."], "correct": 1}, {"tema": "Diseño de Puestos", "q": "Indique cuál de las siguientes afirmaciones relacionadas con el concepto de estructura matricial es FALSA.", "opts": ["Es un sistema de gestión dual. (doble autoridad formal)", "En la base de la estructura están los puestos agrupados con base a la función y otras que se agrupan según el mercado.", "Se puede decir que es una estructura divisional donde se añade una coordinación funcional.", "La comunicación es muy fluida.", "Todas son correctas."], "correct": 2}, {"tema": "Regulación del Comportamiento", "q": "¿Cómo se denomina el parámetro de diseño a través del que describe la forma en que deben realizar una tarea?", "opts": ["Normalización de procesos (mecanismo de coordinación)", "Adoctrinamiento", "Preparación (normalización de habilidades)", "Formalización"], "correct": 3}, {"tema": "Regulación del Comportamiento", "q": "Analice la siguiente afirmación: \"La socialización y el adoctrinamiento son dos procesos de naturaleza formal mediante los cuales se transmiten las normas de comportamiento relacionadas con la cultura, valores y normativas organizacionales\".", "opts": ["Los dos procesos son de naturaleza informal. (socialización informal, adoctrinamiento formal)", "La socialización es un proceso de naturaleza informal, mientras que los conocimientos y habilidades necesarios para la realización del trabajo se dan a través del proceso de adoctrinamiento.", "Los dos procesos son de naturaleza formal. (socialización informal, adoctrinamiento formal)", "El adoctrinamiento es un proceso de naturaleza informal. (formal)", "Ninguna de las anteriores."], "correct": 1}, {"tema": "Regulación del Comportamiento", "q": "Indique cuál de las siguientes afirmaciones relacionadas con la planificación de las acciones es FALSA:", "opts": ["La planificación de acciones permite introducir a la estructura el mecanismo de coordinación de la normalización de resultados de forma directa. (forma impura, indirecta)", "A través de la planificación de acciones se determinan las acciones necesarias para alcanzar los objetivos.", "La planificación de acciones puede exceder el trabajo de una unidad, permitiendo coordinar así a distintas unidades involucradas en la consecución de un mismo objetivo.", "La planificación de acciones se considera un parámetro de diseño."], "correct": 0}, {"tema": "Agrupaciones", "q": "Indique cómo un directivo de primera línea podría incrementar el tamaño de la unidad que supervisa:", "opts": ["Formalizando el comportamiento de sus subordinados.", "Permitiendo que sus subordinados se coordinen mediante adaptación mutua. (La adaptación mutua se lleva a cabo para pequeñas empresas, y la normalización para grandes empresas, la normalización de procesos se consigue a través de la formalización)", "Coordinando a sus subordinados a través de supervisión directa.", "Un directivo de primera línea nunca podrá supervisar una unidad de gran tamaño."], "correct": 0}, {"tema": "Agrupaciones", "q": "¿Qué características tiene la estructura organizativa planas?", "opts": ["Tramos de control estrecho y pocos niveles jerárquicos.", "Tramos de control estrechos y mucho nivel de jerárquicos.", "Tramos de control amplios y pocos niveles jerárquicos.", "Tramos de control amplios y muchos niveles jerárquicos."], "correct": 2}, {"tema": "Centralización y Descentralización", "q": "En una empresa repartido de forma igualitaria entre todos los miembros de la organización:", "opts": ["Sus procesos est rar economías de escala", "Son más costosas, derrochan más recursos", "Mayor facilidad para especializar las tareas", "No presenta problemas de aislamiento a la hora de detectar problemas"], "correct": 2}, {"tema": "Examen OE", "q": "Un puesto de trabajo que esté en lo más alto de la jerarquía de la organización estará:", "opts": ["Especializado horizontal y verticalmente", "Especializado verticalmente y ampliado horizontalmente", "Ampliado horizontal y verticalmente", "Especializado horizontalmente y ampliado verticalmente"], "correct": 2}, {"tema": "Mecanismos de Coordinación", "q": "¿Cómo se denomina a los grupos de individuos que tienen responsabilidades sobre un conjunto de decisiones?", "opts": ["Organigramas", "Flujos de información", "Constelaciones de trabajo", "Flujos regulados de información"], "correct": 2}, {"tema": "Diseño de Puestos", "q": "¿En qué situación la preparación introduce el mecanismo de coordinación de la normalización de habilidades?", "opts": ["Al enseñar un procedimiento fijo para realizar una tarea.", "Cuando se trate de un puesto profesional.", "Es imposible acotar todas las situaciones a las que se enfrenta un puesto.", "Todas las anteriores son falsas."], "correct": 1}, {"tema": "Diseño de Puestos", "q": "¿Con qué mecanismo se relaciona la formalización del puesto?", "opts": ["Adaptación mutua.", "Supervisión directa.", "Normalización de procesos.", "Normalización de habilidades."], "correct": 2}, {"tema": "Agrupaciones", "q": "¿Qué mecanismo de coordinación dificulta un gran tamaño de unidad?", "opts": ["Adaptación mutua", "Normalización de procesos", "Normalización de habilidades", "Normalización de resultados"], "correct": 0}];
  const ok = chosen === q.correct;
  if (ok) correct++; else wrong++;

  const btns = document.querySelectorAll('.opt-btn');

  btns[chosen].className += ok ? ' chosen-correct' : ' chosen-wrong';
  if (!ok) btns[q.correct].className += ' show-correct';

  const fb = document.getElementById('feedback');
  fb.className = 'feedback show ' + (ok ? 'correct' : 'wrong');
  fb.textContent = ok
    ? `✓ Correcto — ${q.opts[q.correct]}`
    : `✗ Incorrecto — La correcta era: ${q.opts[q.correct]}`;

  document.getElementById('q-score').textContent = `✓${correct}  ✗${wrong}`;

function nextQ() {
  idx++;
  if (idx >= questions.length) { showResults(); return; }
  showQ();
}

function showResults() {
  document.getElementById('quiz-view').style.display = 'none';
  document.getElementById('results-view').style.display = 'flex';
  document.getElementById('r-pct').textContent = Math.round(correct/questions.length*10) + '/10';
  document.getElementById('r-ok').textContent = correct;
  document.getElementById('r-fail').textContent = wrong;
  document.getElementById('r-total').textContent = questions.length;
}

function backToSelector() {
  document.getElementById('quiz-view').style.display = 'none';
  document.getElementById('results-view').style.display = 'none';
  document.getElementById('selector-view').style.display = '';
}

// TABS
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('panel-' + t.dataset.tab).classList.add('active');
    if (t.dataset.tab === 'banco') filterBank();
  });
});

// BANCO
function filterBank() {
  const s = document.getElementById('b-search').value.toLowerCase();
  const t = document.getElementById('b-tema').value;
  const list = ALL.filter(q =>
    (!t || q.tema === t) &&
    (!s || q.q.toLowerCase().includes(s) || q.opts.some(o => o.toLowerCase().includes(s)))
  );
  document.getElementById('b-count').textContent = `${list.length} preguntas`;
  const el = document.getElementById('b-list');
  el.innerHTML = '';
  list.forEach(q => {
    const div = document.createElement('div');
    div.className = 'bank-item';
    div.innerHTML = `<div class="bank-tema">${q.tema}</div>
      <div class="bank-q">${q.q}</div>
      <div class="bank-ans">✓ ${LETTERS[q.correct]}) ${q.opts[q.correct]}</div>`;
    el.appendChild(div);
  });
}
