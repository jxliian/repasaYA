    <script>
        // DATOS MAESTROS (Inmutables)
        const masterQuestions = [
            { id: 1, text: "Adidas expone en su página web corporativa la siguiente declaración: 'Ser la mejor marca deportiva del mundo', lo cual se corresponde con la misión de la empresa.", isTrue: false, justification: "Generalmente, declaraciones aspiracionales como 'Ser la mejor...' corresponden a la <strong>Visión</strong> (futuro). La Misión define qué hace la empresa hoy." },
            { id: 2, text: "Un servicio como el de 'Room Mate Hotels' presenta la característica de tangibilidad, ya que la habitación de un hotel se puede tocar y percibir de manera clara.", isTrue: false, justification: "Los servicios son fundamentalmente <strong>intangibles</strong>. Aunque uses bienes tangibles (la cama), el producto 'servicio de alojamiento' no se puede poseer ni almacenar." },
            { id: 3, text: "Para una empresa manufacturera, a mayores ingresos directos obtenidos por servicios mayor será su nivel de servitización, mientras que a mayores ingresos indirectos por servicios, menor será su nivel de servitización.", isTrue: false, justification: "La servitización implica integrar servicios. Tanto los ingresos directos como indirectos contribuyen al nivel de servitización, no necesariamente 'menor' por ser indirectos." },
            { id: 4, text: "Entre las decisiones de operaciones de carácter estratégico, se encuentra la gestión de inventarios y la decisión de localización.", isTrue: false, justification: "La localización sí es estratégica (largo plazo), pero <strong>la gestión de inventarios es una decisión táctica/operativa</strong> (medio/corto plazo)." },

            { id: 6, text: "Una programación flexible hace referencia a la rapidez en el diseño, producción y entrega, que es capaz de acortar los tiempos de suministro al cliente.", isTrue: false, justification: "La definición dada (rapidez, acortar tiempos) corresponde a <strong>Rapidez de respuesta</strong>. La flexibilidad es la capacidad de adaptación a cambios." },
            { id: 7, text: "HP tiene capacidad de adaptarse y ajustarse a los cambios de la demanda para introducir innovaciones en el diseño y/o variar el volumen. Según esto, su capacidad de respuesta es flexible.", isTrue: true, justification: "Correcto. La capacidad de cambiar volumen y diseño (mix) define la <strong>flexibilidad</strong>." },
            { id: 8, text: "La servitización puede permitir a los clientes hacer uso de un bien sin comprarlo directamente, generando ingresos a la empresa fabricante.", isTrue: true, justification: "Correcto. Modelos como el alquiler o pago por uso son formas claras de servitización." },
            { id: 9, text: "La dirección de operaciones se centra exclusivamente en la fabricación de productos o bienes tangibles.", isTrue: false, justification: "Falso. La Dirección de Operaciones gestiona tanto la producción de bienes como la prestación de <strong>servicios</strong>." },

            // --- NUEVAS PREGUNTAS (QUIZ T2) ---
    {
        id: 11,
        text: "Al utilizar muchos proveedores se reduce el riesgo de dependencia, pero aumenta la complejidad logística.",

    },

    {

    {

        text: "La logística inversa se limita al transporte de productos devueltos hasta el almacén, mientras que actividades como reciclaje, reacondicionamiento o refabricación forman parte exclusiva de las políticas de sostenibilidad.",
        isTrue: false,
        justification: "El reciclaje, reacondicionamiento y refabricación **también forman parte de la logística inversa**, no solo el transporte."
    },

    // --- NUEVAS PREGUNTAS (QUIZ T3) ---
    {

        // VARIABLES DE ESTADO
        let currentQuestionsList = [...masterQuestions]; // Copia inicial
        let correctCount = 0;
        
        const container = document.getElementById('quiz-container');
        const scoreText = document.getElementById('score-text');

        // FUNCIÓN PRINCIPAL DE RENDERIZADO
        function renderQuiz() {
            container.innerHTML = ''; // Limpiar pantalla
            correctCount = 0; // Reiniciar contador
            scoreText.innerText = `Puntuación: 0 / ${masterQuestions.length}`; // Reset texto

            currentQuestionsList.forEach((q, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="question-header">
                        <span>Pregunta ${index + 1}</span>
                        <span class="question-id-ref">#Original: ${q.id}</span>
                    </div>
                    <div class="question-text">${q.text}</div>
                    <div class="options" id="btns-${index}">
                        <button class="option-btn btn-v" onclick="checkAnswer(${index}, true, this)">Verdadero</button>
                        <button class="option-btn btn-f" onclick="checkAnswer(${index}, false, this)">Falso</button>
                    </div>
                    <div id="feedback-${index}" class="feedback"></div>
                `;
                container.appendChild(card);
            });
        }

        // FUNCIÓN PARA VERIFICAR RESPUESTA
        function checkAnswer(index, userChoice, btnElement) {
            const q = currentQuestionsList[index]; // Usamos la lista ACTUAL (sea mezclada o no)
            const feedbackDiv = document.getElementById(`feedback-${index}`);
            const btnDiv = document.getElementById(`btns-${index}`);
            
            // Evitar doble click
            if (btnDiv.classList.contains('answered')) return;

            btnDiv.classList.add('answered');
            
            let htmlContent = "";

            if (userChoice === q.isTrue) {
                btnElement.classList.add('selected-correct');
                correctCount++;
                htmlContent += `<strong>¡Correcto!</strong> `;
                feedbackDiv.className = "feedback correct";
            } else {
                btnElement.classList.add('selected-wrong');
                htmlContent += `<strong>Incorrecto.</strong> `;
                feedbackDiv.className = "feedback incorrect";
            }

            // Actualizar marcador global
            scoreText.innerText = `Puntuación: ${correctCount} / ${masterQuestions.length}`;

            // Añadir justificación
            if (q.justification) {
                htmlContent += `<div class="justification">${q.justification}</div>`;
            }

            feedbackDiv.innerHTML = htmlContent;
            feedbackDiv.style.display = "block";
        }

        // LÓGICA DE MEZCLA (Fisher-Yates Shuffle)
        function shuffleQuiz() {
            // Clonamos de nuevo el maestro para no perder datos, luego barajamos
            let array = [...masterQuestions];
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            currentQuestionsList = array;
            renderQuiz();
        }

        // LÓGICA DE VOLVER AL ORIGINAL
        function resetToOriginal() {
            currentQuestionsList = [...masterQuestions];
            renderQuiz();
        }

        // INICIAR AL CARGAR
        renderQuiz();

    </script>
